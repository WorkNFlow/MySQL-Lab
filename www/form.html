<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab5</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="flex items-center justify-center min-h-screen bg-gray-100">
    <form action="process.php" method="POST" class="flex flex-col gap-2 border-4 border-green-400 rounded-xl p-4">
      <h1 class="text-black text-2xl text-center mb-4">Покупка билета в кино</h1>
      <div class="flex gap-2">
        <label for="name">Имя:</label>
        <input type="text" id="name" name="name" placeholder="Иван Иванов" class="rounded-xl px-2" required />
      </div>

      <div class="flex gap-2">
        <label for="quantity">Количество билетов:</label>
        <input type="number" id="quantity" name="quantity" placeholder="1" min="1" max="100" class="rounded-xl px-2" required />
      </div>

      <div class="flex gap-2">
        <label for="film_name">Фильм:</label>
        <select id="film_name" name="film_name" class="rounded-xl px-2" required>
          <option value="Avatar3">Аватар 3</option>
          <option value="Formula1">Формула 1</option>
          <option value="Zootopia2">Зверополис 2</option>
        </select>
      </div>

      <div class="flex gap-2 items-center">
        <label for="threeD">3D очки</label>
        <input type="checkbox" id="threeD" name="3D" class="rounded-xl px-2" />
      </div>

      <div class="flex gap-4">
        <span>Тип места:</span>
        <div class="flex items-center gap-1">
          <input type="radio" id="seat-standard" name="seat-type" value="standard" checked required />
          <label for="seat-standard">Стандарт</label>
        </div>
        <div class="flex items-center gap-1">
          <input type="radio" id="seat-vip" name="seat-type" value="vip" required />
          <label for="seat-vip">VIP</label>
        </div>
      </div>

      <button class="p-2 rounded-xl border-2 border-green-600 bg-green-500 hover:bg-green-600 hover:text-white" type="submit">
        Купить
      </button>
    </form>
  </body>
</html>
